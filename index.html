<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Олімпійський Квест: Чорна Локація</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #111111;
            --accent-green: #00E676;
            --button-shadow: #000000;
            --bg-gradient: linear-gradient(135deg, #1f2022, #3a3d40);
            --card-white: #ffffff;
        }
        
        body {
            margin: 0; padding: 0;
            font-family: 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
            background: var(--bg-gradient);
            color: #333333;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .game-container {
            width: 100%; max-width: 460px; margin: 12px;
            background: #f7f9fa; border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 4px solid var(--primary-dark); overflow: hidden;
            box-sizing: border-box; display: flex; flex-direction: column;
        }

        /* Ігрова шапка з інтерактивним треком */
        .game-header {
            background: var(--primary-dark); padding: 18px 15px; color: white; text-align: center;
        }
        .game-title { margin: 0 0 12px 0; font-size: 1.4em; font-weight: 700; color: #FFF; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Бігова доріжка прогресу */
        .progress-track {
            background: #252525; height: 16px; border-radius: 12px; position: relative; margin: 15px 5px 5px 5px; border: 2px solid #444;
        }
        .progress-runner {
            position: absolute; top: -20px; left: 0%; transform: translateX(-50%);
            font-size: 1.7em; transition: left 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Сцена квесту */
        .game-stage { padding: 22px; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }

        /* Картка спортсмена у дитячому стилі */
        .athlete-card {
            background: var(--card-white); border-radius: 26px; padding: 20px;
            box-shadow: 0 8px 0px #e0e0e0, 0 12px 24px rgba(0,0,0,0.15);
            border: 3px solid var(--primary-dark); text-align: center;
            animation: popIn 0.45s ease-out;
        }

        /* Рамка для реальних фотографій з вашого репо */
        .photo-container {
            width: 140px; height: 140px; margin: 0 auto 15px auto;
            background: #ffffff; border-radius: 28px;
            border: 4px solid var(--primary-dark); display: flex; align-items: center;
            justify-content: center; overflow: hidden;
            box-shadow: 0 6px 0px #ddd; position: relative;
        }
        .photo-container img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .athlete-name { font-size: 1.6em; font-weight: 700; margin: 8px 0 16px 0; color: #111; }
        .question-text { font-size: 1.25em; font-weight: 700; margin-bottom: 22px; color: #37474f; line-height: 1.35; }

        /* Кнопки вибору варіантів відповідей */
        .options-grid { display: flex; flex-direction: column; gap: 14px; width: 100%; }
        .answer-btn {
            background: white; border: 3px solid var(--primary-dark); border-radius: 18px;
            padding: 15px 20px; font-size: 1.15em; font-weight: 700; color: #111;
            cursor: pointer; text-align: center; box-shadow: 0 6px 0px var(--primary-dark);
            transition: all 0.1s ease; font-family: inherit;
        }
        .answer-btn:active { transform: translateY(4px); box-shadow: 0 2px 0px var(--primary-dark); }

        /* Вікно екрану успіху */
        .success-box { display: none; text-align: center; animation: celebrate 0.5s ease-out; }
        .success-box p { font-size: 1.2em; line-height: 1.45; font-weight: 700; color: #1b5e20; padding: 0 10px; }
        
        .next-btn {
            background: var(--accent-green); color: #000; border: 3px solid var(--primary-dark);
            padding: 14px 35px; font-size: 1.3em; font-weight: 700; border-radius: 22px;
            box-shadow: 0 6px 0 #00a352; cursor: pointer; margin-top: 15px; display: inline-block;
            font-family: inherit;
        }
        .next-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #00a352; }

        /* Фінальний екран переможця */
        #finish-screen { display: none; text-align: center; padding: 35px 20px; }
        .gold-medal { font-size: 5.5em; animation: pulse 1.5s infinite; margin-bottom: 10px; }

        /* Анімаційні ефекти */
        @keyframes popIn { 0% { transform: scale(0.85); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes celebrate { 0% { transform: translateY(25px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="game-header">
            <div class="game-title">🇺🇦 Олімпійські Чемпіони</div>
            <div class="progress-track">
                <div class="progress-runner" id="runner">🏃‍♂️</div>
            </div>
        </div>

        <div class="game-stage" id="stage">
            </div>

        <div class="game-stage" id="finish-screen">
            <div class="gold-medal">🥇</div>
            <h2 style="font-size: 2.1em; margin: 10px 0; color: #111;">Неймовірно! Фініш!</h2>
            <p style="font-size: 1.3em; color: #444; margin: 5px 0 20px 0;">Ти справжній олімпійський експерт знаєш усіх героїв!</p>
            <div style="background: #FFF; border: 3px solid #111; padding: 18px; border-radius: 24px; font-size: 1.45em; font-weight: bold; box-shadow: 0 6px 0 #ccc;">
                Секретний шифр локації:<br>
                <span style="color:#d84315; font-size: 1.1em; letter-spacing: 1px;">Буква №3 "Ї"</span>
            </div>
        </div>
    </div>

    <script>
        // Повний масив олімпійців відповідно до офіційних даних вашої руханки
        const champions = [
            { name: "Лілія Подкопаєва", id: "foto01.png", desc: "Лілія Подкопаєва у 1996 році на Олімпіаді в Атланті стала чемпіонкою в абсолютній першості й вільних вправах! 🤸‍♀️", q: "Яке місце зайняла збірна України в командному заліку,коли в цей час Лілія Подкопаєва стала чемпіонкою?", o: ["3 місце", "5 місце", "1 місце"], a: 1 },
            { name: "Юрій Чебан", id: "foto02.png", desc: "Дворазовий чемпіон! У Ріо-де-Жанейро виграв золото у веслуванні на каное на 200 метрів із новим фантастичним рекордом — 39,279 секунди! 🚣‍♂️", q: "Який рекордний час Юрій показав у Ріо?", o: ["39,279 сек", "42,291 сек", "45,102 sec"], a: 0 },
            { name: "Оксана Баюл", id: "foto03.png", desc: "Принесла першу історичну золоту медаль для незалежної України на XVII Зимових Олімпійських іграх у Ліллегаммері 1994 року! ⛸️", q: "У якому виді спорту блискуче виступила Оксана?", o: ["Швидкісний біг", "Слалом", "Фігурне катання"], a: 2 },
            { name: "В'ячеслав Олійник", id: "foto04.png", desc: "Здобув історичне перше золото на літніх Олімпійських іграх для нашої країни (Атланта 1996)! 🤼‍♂️", q: "Яке місце В'ячеслав посів через 4 роки на Олімпіаді в Сіднеї?", o: ["1 місце", "14 місце", "5 місце"], a: 1 },
            { name: "Катерина Серебрянська", id: "foto05.png", desc: "Абсолютна чемпіонка світу, Європи та Олімпійських ігор з художньої гімнастики! Має безліч нагород! 🎀", q: "Скільки всього титулів чемпіонки світу вона завоювала?", o: ["8 титулів", "3 титули", "12 титулів"], a: 0 },
            { name: "Рустам Шаріпов", id: "foto06.png", desc: "Видатний гімнаст, який здобув олімпійське золото на паралельних брусах у 1996 році! 🤸‍♂️", q: "В якому році він виграв своє найперше золото в команді?", o: ["1988 рік", "1992 рік", "2000 рік"], a: 1 },
            { name: "Наталія Скакун", id: "foto07.png", desc: "Олімпійська чемпіонка з важкої атлетики, яка встановила олімпійський рекорд у поштовху — 135 кг! 🏋️‍♀️", q: "Яку сумарну вагу підняла Наталія на змаганнях?", o: ["200 кг", "215,5 кг", "242,5 кг"], a: 2 },
            { name: "Віктор Рубан", id: "foto08.png", desc: "Неймовірний лучник, який у надприродному за напругою фіналі перестріляв корейця Пак Гьон Мо з рахунком 113:112! 🏹", q: "З якого виду спорту Віктор приніс Україні золото?", o: ["Стрільба з лука", "Кульова стрільба", "Фехтування"], a: 0 },
            { name: "Олександр Усик", id: "foto09.png", desc: "Здобув золото у видовищному фіналі проти італійця Клементе Руссо, взявши реванш за Пекін! 🥊", q: "Кому Олександр програв у другому турі 4 роки тому в Пекіні?", o: ["Клементе Руссо", "Ентоні Джошуа", "Володимиру Кличку"], a: 0 },
            { name: "Олексій Торохтій", id: "foto10.png", desc: "Став чемпіоном Олімпійських ігор 2012 року у ваговій категорії до 105 кг серед кращих важкоатлетів планети! 🏋️‍♂️", q: "На скільки кілограмів його результат випередив 2-ге місце?", o: ["на 5 кг", "на 1 кг", "на 3 кг"], a: 1 }
        ];

        let currentIdx = 0;
        const stage = document.getElementById('stage');
        const runner = document.getElementById('runner');

        function renderCard() {
            if (currentIdx >= champions.length) {
                stage.style.display = 'none';
                document.getElementById('finish-screen').style.display = 'block';
                runner.style.left = 'calc(100% - 15px)';
                return;
            }

            // Плавне переміщення бігуна по доріжці квесту
            let percent = (currentIdx / champions.length) * 100;
            runner.style.left = `calc(${percent}% - ${percent === 0 ? 0 : 15}px)`;

            let c = champions[currentIdx];
            stage.innerHTML = `
                <div class="athlete-card" id="card">
                    <div id="quiz-part">
                        <div class="photo-container">
                            <img src="${c.id}" alt="${c.name}">
                        </div>
                        <div class="athlete-name">${c.name}</div>
                        <div class="question-text">❓ ${c.q}</div>
                        <div class="options-grid">
                            ${c.o.map((opt, i) => `<button class="answer-btn" onclick="checkAnswer(${i})">${opt}</button>`).join('')}
                        </div>
                    </div>
                    <div class="success-box" id="success-part">
                        <div style="font-size: 3.5em; margin-bottom: 5px;">🌟</div>
                        <h3 style="color:#2E7D32; font-size:1.6em; margin:5px 0;">Правильно! Молодчинка!</h3>
                        <p>${c.desc}</p>
                        <button class="next-btn" onclick="nextQuestion()">Біжимо далі! 🚀</button>
                    </div>
                </div>
            `;
        }

        function checkAnswer(chosenIdx) {
            let correctIdx = champions[currentIdx].a;
            if (chosenIdx === correctIdx) {
                document.getElementById('quiz-part').style.display = 'none';
                document.getElementById('success-part').style.display = 'block';
                document.getElementById('card').style.borderColor = '#00E676';
            } else {
                // Дитяче сповіщення про помилку
                alert("❌ Ой, спробуй ще раз! Справжні олімпійці ніколи не здаються!");
            }
        }

        function nextQuestion() {
            currentIdx++;
            renderCard();
        }

        // Запуск квесту з першого спортсмена
        renderCard();
    </script>
</body>
</html>
